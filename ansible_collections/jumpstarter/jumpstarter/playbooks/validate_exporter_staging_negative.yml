- name: Jumpstarter bridge tasks must not run after staging failure
  hosts: localhost
  gather_facts: false
  vars:
    jumpstarter_exporter_name: no-such-exporter
    jumpstarter_required_exporter_name: no-such-exporter
    jumpstarter_exporter_source: project
    jumpstarter_project_exporters_dir: /tmp/nonexistent-jumpstarter-exporters-dir
    jumpstarter_runtime_exporters_dir: /tmp/jumpstarter/exporters_validate_bridge
  tasks:
    - name: Staging failure should prevent later bridge
      block:
        - name: Run staging against missing project dir
          ansible.builtin.include_role:
            name: jumpstarter.jumpstarter.jumpstarter_exporter_stage

        - name: Simulated bridge step (must not execute)
          ansible.builtin.fail:
            msg: BRIDGE_RAN_BUT_SHOULD_NOT
      rescue:
        - name: Expect staging error, not bridge marker
          ansible.builtin.assert:
            that:
              - "'BRIDGE_RAN_BUT_SHOULD_NOT' not in (ansible_failed_result.msg | default(''))"
              - >-
                ('Project exporter source directory' in (ansible_failed_result.msg | default('')))
                or ('missing' in (ansible_failed_result.msg | default('') | lower))
            fail_msg: "{{ ansible_failed_result.msg | default('no message') }}"
