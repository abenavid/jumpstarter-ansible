---
# Expected failures for exporter staging; run with:
# ANSIBLE_COLLECTIONS_PATH=... ansible-playbook playbooks/validate_exporter_staging_negative.yml
- name: Missing exporter should fail clearly
  hosts: localhost
  gather_facts: false
  vars:
    jumpstarter_exporter_name: definitely-missing-exporter
    jumpstarter_required_exporter_name: definitely-missing-exporter
    jumpstarter_exporter_source: project
    jumpstarter_repo_root: "{{ playbook_dir }}/../../../.."
    jumpstarter_project_exporters_dir: "{{ jumpstarter_repo_root }}/exporters"
    jumpstarter_runtime_exporters_dir: /tmp/jumpstarter/exporters_validate_missing
  tasks:
    - name: Expect staging failure (no such exporter in project)
      block:
        - name: Run staging
          ansible.builtin.include_role:
            name: jumpstarter.jumpstarter.jumpstarter_exporter_stage

        - name: Should not reach here
          ansible.builtin.fail:
            msg: staging should have failed for missing exporter
      rescue:
        - name: Confirm failure mentions missing exporter
          ansible.builtin.assert:
            that:
              - >-
                ('Required exporter file missing' in (ansible_failed_result.msg | default('')))
                or ('No exporter YAML found' in (ansible_failed_result.msg | default('')))
                or ('No *.yaml' in (ansible_failed_result.msg | default('')))
            fail_msg: "{{ ansible_failed_result.msg | default('no message') }}"

- name: metadata.name mismatch should fail clearly
  hosts: localhost
  gather_facts: false
  vars:
    jumpstarter_exporter_name: sim-vehicle-exporter
    jumpstarter_required_exporter_name: sim-vehicle-exporter
    jumpstarter_exporter_source: project
    jumpstarter_runtime_exporters_dir: /tmp/jumpstarter/exporters_validate_meta
  tasks:
    - name: Create temp exporters dir with wrong metadata.name
      ansible.builtin.tempfile:
        state: directory
        suffix: jumpstarter_badmeta
      register: _badmeta_dir

    - name: Write mismatched ExporterConfig
      ansible.builtin.copy:
        dest: "{{ _badmeta_dir.path }}/sim-vehicle-exporter.yaml"
        mode: "0644"
        content: |
          apiVersion: jumpstarter.dev/v1alpha1
          kind: ExporterConfig
          metadata:
            name: wrong-name
            namespace: ""
          endpoint: ""
          token: ""
          export:
            power:
              type: jumpstarter_driver_power.driver.MockPower
            storage:
              type: jumpstarter_driver_opendal.driver.MockStorageMux
            serial:
              type: jumpstarter_driver_pyserial.driver.PySerial
              config:
                url: "loop://"

    - name: Expect metadata validation failure
      block:
        - name: Run staging against bad metadata
          ansible.builtin.include_role:
            name: jumpstarter.jumpstarter.jumpstarter_exporter_stage
          vars:
            jumpstarter_project_exporters_dir: "{{ _badmeta_dir.path }}"

        - name: Should not reach here
          ansible.builtin.fail:
            msg: staging should have failed on metadata mismatch
      rescue:
        - name: Confirm failure mentions metadata.name
          ansible.builtin.assert:
            that:
              - "'metadata.name' in (ansible_failed_result.msg | default('')) or 'Exporter YAML metadata.name' in (ansible_failed_result.msg | default(''))"
            fail_msg: "{{ ansible_failed_result.msg | default('no message') }}"

