---
# Validate ExporterConfig YAML for each host in the Job Template’s AAP inventory.
# Hosts and variables (e.g. jumpstarter_exporter_name) come only from AAP—manual
# inventory, SCM-sourced inventory, or another AAP project—not from files shipped
# in this playbook/collection repository. Exporter YAML files are read from the
# Job Template’s playbook project checkout (default /runner/project/exporters).
#
# Collections path: repo-root ansible.cfg (and playbooks/ansible.cfg) add the
# project tree so jumpstarter.jumpstarter roles resolve in AAP and locally.
# Alternatively set ANSIBLE_COLLECTIONS_PATHS to the parent of ansible_collections.
- name: Validate exporter staging (AAP inventory)
  hosts: all
  gather_facts: false
  
  # Use the execution environment filesystem (/runner/project); still evaluate each
  # inventory host’s vars (e.g. jumpstarter_exporter_name).
  connection: local
  # Role resets jumpstarter_runtime_exporters_dir; serialize to avoid parallel clashes.
  serial: 1
  collections:
    - jumpstarter.jumpstarter
  vars:
    jumpstarter_exporter_source: project
    jumpstarter_project_exporters_dir: /runner/project/exporters
    jumpstarter_runtime_exporters_dir: /tmp/jumpstarter/exporters
  tasks:
    - name: Require jumpstarter_exporter_name for this host
      ansible.builtin.assert:
        that:
          - jumpstarter_exporter_name is defined
          - (jumpstarter_exporter_name | string | length) > 0
        fail_msg: >-
          jumpstarter_exporter_name must be set for each inventory host
          (host={{ inventory_hostname }}).

    - name: Stage and validate exporter for this host
      ansible.builtin.include_role:
        name: jumpstarter.jumpstarter.jumpstarter_exporter_stage
      vars:
        jumpstarter_required_exporter_name: "{{ jumpstarter_exporter_name }}"
