---
# Resolve simulator facts and paths; load or seed twin.json / state.json on the target host.
- name: Publish Jumpstarter exporter name for later play tasks
  ansible.builtin.set_fact:
    jumpstarter_exporter_name: >-
      {{
        inventory_hostname
        if (jumpstarter_exporter_name | default('', true) | string | trim | length) == 0
        else jumpstarter_exporter_name
      }}

- name: Set simulator file paths for this host
  ansible.builtin.set_fact:
    simulator_host_dir: "{{ simulator_runtime_base_dir }}/{{ inventory_hostname }}"
    simulator_twin_path: "{{ simulator_runtime_base_dir }}/{{ inventory_hostname }}/twin.json"
    simulator_state_path: "{{ simulator_runtime_base_dir }}/{{ inventory_hostname }}/state.json"

- name: Ensure per-host simulator runtime directory exists
  ansible.builtin.file:
    path: "{{ simulator_host_dir }}"
    state: directory
    mode: "0755"

- name: Resolve optional simulator definition file under simulator_definitions_dir
  ansible.builtin.set_fact:
    _sim_def_path: "{{ lookup('ansible.builtin.first_found', params, errors='ignore') | default('', true) }}"
  vars:
    params:
      files:
        - "{{ inventory_hostname }}.yml"
        - "{{ inventory_hostname }}.yaml"
        - "{{ inventory_hostname }}.json"
      paths:
        - "{{ simulator_definitions_dir }}"

- name: Load simulator definition from file
  when: _sim_def_path | length > 0
  ansible.builtin.include_vars:
    file: "{{ _sim_def_path }}"
    name: _sim_def

- name: Use empty in-memory definition when no file matched
  when: _sim_def_path | length == 0
  ansible.builtin.set_fact:
    _sim_def: {}

- name: Merge simulator_name and simulator_config from inventory and definition file
  ansible.builtin.set_fact:
    simulator_name: "{{ simulator_name | default(_sim_def.simulator_name | default(inventory_hostname)) }}"
    simulator_config: "{{ simulator_config | default(_sim_def.simulator_config | default({})) }}"

- name: Check for existing twin.json
  ansible.builtin.stat:
    path: "{{ simulator_twin_path }}"
  register: _sim_select_twin_stat

- name: Load simulator twin from disk
  when: _sim_select_twin_stat.stat.exists | default(false)
  ansible.builtin.slurp:
    path: "{{ simulator_twin_path }}"
  register: _sim_select_twin_slurp

- name: Parse twin from disk into simulator_twin
  when: _sim_select_twin_stat.stat.exists | default(false)
  ansible.builtin.set_fact:
    simulator_twin: "{{ _sim_select_twin_slurp.content | b64decode | from_json }}"

- name: Seed new simulator twin when twin.json is absent
  when: not (_sim_select_twin_stat.stat.exists | default(false))
  ansible.builtin.set_fact:
    simulator_twin:
      metadata: >-
        {{
          (
            simulator_metadata
            | default(_sim_def.simulator_metadata | default({}))
          )
          | combine(
              {
                'simulator_name': simulator_name,
                'inventory_hostname': inventory_hostname,
              },
              recursive=True,
            )
        }}
      status: unknown
      power_state: unknown
      last_test_result: null
      exporter: "{{ jumpstarter_exporter_name }}"

- name: Write seeded twin.json when it did not exist
  when: not (_sim_select_twin_stat.stat.exists | default(false))
  ansible.builtin.copy:
    dest: "{{ simulator_twin_path }}"
    content: "{{ simulator_twin | to_nice_json }}\n"
    mode: "0644"

- name: Check for existing state.json
  ansible.builtin.stat:
    path: "{{ simulator_state_path }}"
  register: _sim_select_state_stat

- name: Write empty state object when state.json is absent
  when: not (_sim_select_state_stat.stat.exists | default(false))
  ansible.builtin.copy:
    dest: "{{ simulator_state_path }}"
    content: |
      {}
    mode: "0644"
