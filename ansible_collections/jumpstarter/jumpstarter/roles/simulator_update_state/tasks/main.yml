---
# Merge updates into file-backed simulator state.json and optionally twin.json.
- name: Stat simulator state file
  ansible.builtin.stat:
    path: "{{ simulator_state_path }}"
  register: _sim_update_state_stat

- name: Read current simulator state
  when: _sim_update_state_stat.stat.exists | default(false)
  ansible.builtin.slurp:
    path: "{{ simulator_state_path }}"
  register: _sim_update_state_slurp

- name: Parse simulator state from disk (or empty dict)
  ansible.builtin.set_fact:
    _sim_state_base: >-
      {{
        (
          _sim_update_state_slurp.content | b64decode | from_json
        )
        if (_sim_update_state_stat.stat.exists | default(false))
        else {}
      }}

- name: Merge state updates after optional key removal
  ansible.builtin.set_fact:
    _sim_state_merged: >-
      {{
        (
          _sim_state_base
          | dict2items
          | rejectattr('key', 'in', simulator_state_remove_keys | default([]))
          | items2dict
        )
        | combine(simulator_state_updates | default({}), recursive=True)
      }}

- name: Write simulator state.json
  ansible.builtin.copy:
    dest: "{{ simulator_state_path }}"
    content: "{{ _sim_state_merged | to_nice_json }}\n"
    mode: "0644"

- name: Stamp time for twin last_updated
  ansible.builtin.set_fact:
    _simulator_update_ts: "{{ ansible_date_time.date }}T{{ ansible_date_time.time }}Z"
  when:
    - simulator_update_twin | bool
    - ansible_date_time is defined

- name: Stamp time when gather_facts is disabled
  ansible.builtin.set_fact:
    _simulator_update_ts: "1970-01-01T00:00:00Z"
  when:
    - simulator_update_twin | bool
    - ansible_date_time is not defined

- name: Stat simulator twin file
  when: simulator_update_twin | bool
  ansible.builtin.stat:
    path: "{{ simulator_twin_path }}"
  register: _sim_update_twin_stat

- name: Read current simulator twin
  when:
    - simulator_update_twin | bool
    - _sim_update_twin_stat.stat.exists | default(false)
  ansible.builtin.slurp:
    path: "{{ simulator_twin_path }}"
  register: _sim_update_twin_slurp

- name: Parse simulator twin from disk (or empty dict)
  when: simulator_update_twin | bool
  ansible.builtin.set_fact:
    _sim_twin_base: >-
      {{
        (
          _sim_update_twin_slurp.content | b64decode | from_json
        )
        if (_sim_update_twin_stat.stat.exists | default(false))
        else {}
      }}

- name: Merge twin updates and refresh last_updated
  when: simulator_update_twin | bool
  ansible.builtin.set_fact:
    _sim_twin_merged: >-
      {{
        _sim_twin_base
        | combine(simulator_twin_updates | default({}), recursive=True)
        | combine({'last_updated': _simulator_update_ts}, recursive=True)
      }}

- name: Write simulator twin.json
  when: simulator_update_twin | bool
  ansible.builtin.copy:
    dest: "{{ simulator_twin_path }}"
    content: "{{ _sim_twin_merged | to_nice_json }}\n"
    mode: "0644"
